# Auto-detected camera configuration
# Generated by hardware auto-detection
# Review and copy desired sections to config.toml

# Camera source precedence in replays (highest to lowest):
# 1) multicast.toml mapping (when [multicast].enabled = true in config.toml)
# 2) auto.toml camera sections (this file, when multicast is disabled)
# 3) camera sections in config.toml ([windows*], [linux*], etc.)
#
# Note: this precedence applies only to camera source definitions.
# Other application settings still come from config.toml.

[camera1]
    description = "Logitech Webcam C930e (mjpeg, 1920x1080)"
    enabled = true
    camera = 'video=Logitech Webcam C930e'
    format = 'dshow'
    size = "1920x1080"
    fps = 30

    inputParameters = '-vcodec mjpeg -rtbufsize 512M -thread_queue_size 4096'
    outputParameters = '-vcodec copy -an'
    recode = true

[camera2]
    description = "OV01A (yuyv422, 1280x720)"
    enabled = true
    camera = 'video=OV01A'
    format = 'dshow'
    size = "1280x720"
    fps = 30

    inputParameters = '-init_hw_device qsv=hw -filter_hw_device hw -rtbufsize 512M -thread_queue_size 4096 -pixel_format yuyv422'
    outputParameters = '-vf format=nv12,hwupload=extra_hw_frames=64 -c:v h264_qsv -preset medium -look_ahead 0 -rc_mode CBR -b:v 8M -g 30 -keyint_min 30 -r 30 -vsync cfr -an'
    recode = false

[camera3]
    description = "UVC Camera (mjpeg, 1920x1080)"
    enabled = true
    camera = 'video=UVC Camera'
    format = 'dshow'
    size = "1920x1080"
    fps = 60

    inputParameters = '-vcodec mjpeg -rtbufsize 512M -thread_queue_size 4096'
    outputParameters = '-vcodec copy -an'
    recode = true

[camera4]
    description = "OBS Virtual Camera (nv12, 1920x1080)"
    enabled = true
    camera = 'video=OBS Virtual Camera'
    format = 'dshow'
    size = "1920x1080"
    fps = 60

    inputParameters = '-init_hw_device qsv=hw -filter_hw_device hw -rtbufsize 512M -thread_queue_size 4096 -pixel_format nv12'
    outputParameters = '-vf format=nv12,hwupload=extra_hw_frames=64 -c:v h264_qsv -preset medium -look_ahead 0 -rc_mode CBR -b:v 8M -g 60 -keyint_min 60 -r 60 -vsync cfr -an'
    recode = false

