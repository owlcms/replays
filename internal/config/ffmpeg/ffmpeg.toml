# =========================================================================
# ffmpeg.toml — shared cameras/replays detection + encoder config
# =========================================================================
#
# This file defines shared encoder and camera-selection behavior used by:
#  - cameras (multicast emitter)
#  - replays:  auto.toml generation, legacy compatibility
#
# cameras app
# - input
#   - input format is obtained by probing cameras
#   - format preference is defined in [cameras] priorities
# - output
#   - H.264 input is copied (no re-encode)
#   - MJPEG and raw inputs are encoded to H.264 using the settings in the encoder blocks
#
# replays app (this file is used for auto.toml generation)
# - input
#   - input format is obtained by probing cameras
#   - format preference is defined in [cameras] priorities
# - recording output in auto.toml
#   - H.264 input is copied
#   - MJPEG input is copied with recode=true (unlike cameras, no live encoding; recoding happens during trimming)
#   - raw input uses encoder block settings to produce H.264 (or software fallback when no hardware encoder is available)
# - trim/finalize output
#   - MJPEG recode path currently uses built-in software libx264 settings (not encoder blocks, since it is done during trimming and not real time)


# =========================================================================
# Camera Selection Priorities
# =========================================================================

[cameras]
    # Preferred camera input format priority (highest to lowest).
    # h264 cameras are remuxed with -c:v copy (no encoding needed).
    # mjpeg and raw cameras are encoded to H.264 using the best encoder.
    formatPriority = ["h264", "mjpeg"]

    # Preferred resolution/fps ladder (highest to lowest priority).
    # Format: "WIDTHxHEIGHT@FPS" — fps uses >= threshold (59 matches 60, 29 matches 30).
    modePriority = [
        "1920x1080@59",
        "1280x720@59",
        "1920x1080@29",
        "1280x720@29",
    ]

# =========================================================================
# Software Encoder Fallback
# =========================================================================
# Used when no hardware encoder is available or functional.

[software]
    outputParameters = "-c:v libx264 -preset ultrafast -tune zerolatency -b:v 4M"

# =========================================================================
# GPU Encoder Definitions
# =========================================================================
#
# Each [[encoder]] block defines parameters for one hardware encoder.
# The program probes ffmpeg for available encoders, then verifies each
# one actually works on the current hardware. The first working encoder
# (in the order listed here) is used for cameras that need encoding.
#
# Some blocks are specific to a platform (windows dshow vs linux v4l2)

[[encoder]]
    name = "h264_nvenc"
    description = "NVIDIA GPU (NVENC)"
    gpuVendors = ["nvidia"]
    inputParameters = "-rtbufsize 512M -thread_queue_size 4096"
    videoFilter = ""
    outputParameters = "-c:v h264_nvenc -preset p5 -rc cbr -b:v 8M"
    testInit = ""

[[encoder]]
    name = "h264_amf"
    description = "AMD GPU (AMF)"
    gpuVendors = ["amd"]
    inputParameters = "-rtbufsize 512M -thread_queue_size 4096"
    videoFilter = ""
    outputParameters = "-c:v h264_amf -rc cbr -b:v 8M"
    testInit = ""

[[encoder]]
    name = "h264_vaapi"
    platform = "v4l2"
    description = "VAAPI (AMD/Intel on Linux)"
    gpuVendors = ["amd", "intel"]
    inputParameters = "-init_hw_device vaapi=va:/dev/dri/renderD128 -filter_hw_device va -rtbufsize 512M -thread_queue_size 4096"
    videoFilter = "format=nv12,hwupload"
    outputParameters = "-c:v h264_vaapi -rc_mode cbr -b:v 8M"
    testInit = "-init_hw_device vaapi=va:/dev/dri/renderD128"

[[encoder]]
    name = "h264_qsv"
    platform = "v4l2"
    description = "Intel GPU (QSV / Xe)"
    gpuVendors = ["intel"]
    inputParameters = "-init_hw_device qsv=hw:/dev/dri/renderD128 -filter_hw_device hw -rtbufsize 512M -thread_queue_size 4096"
    videoFilter = "format=nv12"
    outputParameters = "-c:v h264_qsv -preset medium -look_ahead 0 -rc_mode cbr -b:v 8M"
    testInit = "-init_hw_device qsv=hw:/dev/dri/renderD128 -filter_hw_device hw"

[[encoder]]
    name = "h264_qsv"
    platform = "dshow"
    description = "Intel GPU (QSV on Windows)"
    gpuVendors = ["intel"]
    inputParameters = "-init_hw_device qsv=hw -filter_hw_device hw -rtbufsize 512M -thread_queue_size 4096"
    videoFilter = "format=nv12"
    outputParameters = "-c:v h264_qsv -preset medium -look_ahead 0 -rc_mode cbr -b:v 8M"
    testInit = "-init_hw_device qsv=hw -filter_hw_device hw"

# =========================================================================
# Common Output Settings
# =========================================================================

[output]
    # Additional output flags appended to every stream
    extraFlags = "-an -f mpegts"
